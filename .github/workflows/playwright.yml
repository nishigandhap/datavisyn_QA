name: Playwright Tests

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: docker build -t nishipatil/playwright-tests:v2 .

      # Step 4: Push Docker Image
      - name: Push Docker Image
        run: docker push nishipatil/playwright-tests:v2

      # Step 5: Deploy to EC2 and run container
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "Cleaning old container..."
            sudo docker rm -f playwright-container || true

            echo "Cleaning old report folder..."
            sudo rm -rf /home/ubuntu/playwright-report

            echo "Preparing report folder..."
            mkdir -p /home/ubuntu/playwright-report

            echo "Pulling latest image..."
            sudo docker pull nishipatil/playwright-tests:v2

            echo "Running container..."
            sudo docker run \
              --user root \
              -v /home/ubuntu/playwright-report:/app/playwright-report \
              --name playwright-container \
              nishipatil/playwright-tests:v2

            echo "Fixing permissions..."
            sudo chmod -R 777 /home/ubuntu/playwright-report

            echo "Verify report:"
            ls -la /home/ubuntu/playwright-report

            echo "Zipping report..."
            cd /home/ubuntu
            tar -czf playwright-report.tar.gz playwright-report

            echo "Zip created:"
            ls -la /home/ubuntu/playwright-report.tar.gz

      # Step 6: Copy ZIP from EC2
      - name: Copy Report ZIP from EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "/home/ubuntu/playwright-report.tar.gz"
          target: "./"

      # Step 7: Unzip report in runner
      - name: Extract Playwright Report
        run: |
          tar -xzf playwright-report.tar.gz
          ls -la

      # Step 8: Upload report as artifact
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/