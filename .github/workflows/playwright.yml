name: Playwright Tests

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: docker build -t nishipatil/playwright-tests:v2 .

      # Step 4: Push Docker Image
      - name: Push Docker Image
        run: docker push nishipatil/playwright-tests:v2

      # Step 5: Deploy to EC2 and run container
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "Cleaning old container..."
            sudo docker rm -f playwright-container || true

            echo "Cleaning old report folder..."
            sudo rm -rf ~/playwright-report

            echo "Preparing report folder..."
            mkdir -p ~/playwright-report

            echo "Pulling latest image..."
            sudo docker pull nishipatil/playwright-tests:v2

            echo "Running container..."
            sudo docker run \
              --user root \
              -v ~/playwright-report:/app/playwright-report \
              --name playwright-container \
              nishipatil/playwright-tests:v2

            echo "Fixing permissions..."
            sudo chmod -R 777 ~/playwright-report

            echo "Verify report:"
            ls -la ~/playwright-report

      # Step 6: Copy report from EC2 to GitHub runner
      - name: Copy Playwright Report from EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "/home/ubuntu/playwright-report"
          target: "./"
          strip_components: 1

      # Step 7: Upload report as artifact
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/