

name: Playwright Tests

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: docker build -t nishipatil/playwright-tests:v2 .

      # Step 4: Push Docker Image
      - name: Push Docker Image
        run: docker push nishipatil/playwright-tests:v2

      # Step 5: Run on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            
            sudo docker system prune -a -f

            echo "Cleanup old container"
            sudo docker rm -f playwright-container || true

            echo "Cleanup old report"
            sudo rm -rf /home/ubuntu/playwright-report
            sudo rm -f /home/ubuntu/report.tar.gz

            echo "Create report dir"
            mkdir -p /home/ubuntu/playwright-report

            echo "Pull latest image"
            sudo docker pull nishipatil/playwright-tests:v2

            echo "Run container"
            sudo docker run \
              --user root \
              -v /home/ubuntu/playwright-report:/app/playwright-report \
              --name playwright-container \
              nishipatil/playwright-tests:v2

            echo "Fix permissions"
            sudo chmod -R 777 /home/ubuntu/playwright-report

            echo "VERIFY REPORT EXISTS"
            ls -la /home/ubuntu/playwright-report

            echo "Create TAR (IMPORTANT STEP)"
            cd /home/ubuntu
            tar -czf report.tar.gz playwright-report

            echo "VERIFY TAR"
            ls -la /home/ubuntu/report.tar.gz

      # Step 6: Copy TAR file (NO wildcard, NO folder)
      - name: Copy Report from EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "/home/ubuntu/report.tar.gz"
          target: "./"

      # Step 7: Extract TAR in GitHub runner
      - name: Extract Report
        run: |
          tar -xzf report.tar.gz
          ls -la

      # Step 8: Upload report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/