name: Playwright Tests

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: docker build -t nishipatil/playwright-tests:latest .

      # Step 4: Push Image to Docker Hub
      - name: Push Docker Image
        run: docker push nishipatil/playwright-tests:latest

      # Step 5: Deploy to EC2 and run container
      - name: Deploy to EC2 and run tests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Cleaning old container..."
            sudo docker rm -f playwright-container || true

            echo "Pulling latest image..."
            sudo docker pull nishipatil/playwright-tests:latest

            echo "Running container..."
            sudo docker run --name playwright-container nishipatil/playwright-tests:latest

            echo "Container logs:"
            sudo docker logs playwright-container || true